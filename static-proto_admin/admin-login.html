<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>健康管理 - 后台登录</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Microsoft YaHei',sans-serif;background:#f0f0f0;
  display:flex;align-items:center;justify-content:center;min-height:100vh
}
.login-container{
  width:100%;min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#e8f5e8 0%,#f0f9ff 50%,#e0f2fe 100%);
  position:relative;overflow:hidden
}
.bg-circle{position:absolute;border-radius:50%;background:rgba(74,222,128,.1);animation:float 6s ease-in-out infinite;pointer-events:none}
.bg-circle.c1{width:200px;height:200px;top:10%;left:10%}
.bg-circle.c2{width:150px;height:150px;top:60%;right:15%;background:rgba(59,130,246,.08);animation-delay:2s}
.bg-circle.c3{width:100px;height:100px;bottom:20%;left:20%;background:rgba(16,185,129,.12);animation-delay:4s}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}

.login-card{
  width:420px;background:rgba(255,255,255,.95);backdrop-filter:blur(10px);
  border-radius:24px;box-shadow:0 20px 40px rgba(0,0,0,.1);
  border:1px solid rgba(255,255,255,.2);overflow:hidden;position:relative;z-index:1
}
.login-header{padding:40px 40px 20px;text-align:center;background:linear-gradient(135deg,#10b981,#059669);color:#fff;position:relative}
.login-header::before{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background-image:radial-gradient(circle,rgba(255,255,255,.1) 1px,transparent 1px);
  background-size:20px 20px
}
.logo-box{position:relative;z-index:1}
.logo-circle{width:64px;height:64px;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:32px}
.main-title{font-size:28px;font-weight:700;margin-bottom:8px;letter-spacing:1px}
.sub-title{font-size:14px;opacity:.9;font-weight:400}

.form-wrapper{padding:40px}
.form-group{margin-bottom:24px}
.form-label{display:block;color:#374151;font-weight:600;font-size:14px;margin-bottom:8px}
.form-input{width:100%;height:44px;padding:0 14px;border:1px solid #e5e7eb;border-radius:12px;font-size:14px;color:#333;outline:none;transition:all .3s;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.form-input:focus{border-color:#10b981;box-shadow:0 0 0 3px rgba(16,185,129,.1)}
.form-input::placeholder{color:#afbdcc}
.code-row{display:flex;gap:12px}
.code-row .form-input{flex:1}
.code-img{height:44px;border-radius:8px;cursor:pointer;flex-shrink:0;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:20px;padding:0 16px;user-select:none;letter-spacing:3px;font-style:italic;color:#333;font-weight:bold;border:1px solid #e0e0e0}

.login-btn{width:100%;height:48px;font-size:16px;font-weight:600;border-radius:12px;background:linear-gradient(135deg,#10b981,#059669);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .3s;margin-top:8px}
.login-btn:hover{background:linear-gradient(135deg,#059669,#047857);transform:translateY(-2px);box-shadow:0 8px 20px rgba(16,185,129,.3)}
.login-btn:active{transform:translateY(0)}

.footer-link{text-align:center;margin-top:24px}
.footer-link a{color:#10b981;text-decoration:none;font-size:14px;font-weight:500}
.footer-link a:hover{text-decoration:underline}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#fff;color:#333;padding:12px 24px;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.15);font-size:14px;z-index:3000;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.toast.error{color:#F44336;border-left:3px solid #F44336}
.toast.success{color:#4CAF50;border-left:3px solid #4CAF50}
</style>
</head>
<body>
<div class="login-container">
  <div class="bg-circle c1"></div>
  <div class="bg-circle c2"></div>
  <div class="bg-circle c3"></div>

  <div class="login-card">
    <div class="login-header">
      <div class="logo-box">
        <div class="logo-circle">🏥</div>
        <h1 class="main-title">健康管理</h1>
        <p class="sub-title">个人健康小程序管理端</p>
      </div>
    </div>

    <div class="form-wrapper">
      <div class="form-group">
        <label class="form-label">账号</label>
        <input type="text" class="form-input" id="userName" placeholder="请输入账号" autocomplete="off">
      </div>
      <div class="form-group">
        <label class="form-label">密码</label>
        <input type="password" class="form-input" id="password" placeholder="请输入密码">
      </div>
      <div class="form-group">
        <label class="form-label">验证码</label>
        <div class="code-row">
          <input type="text" class="form-input" id="captcha" placeholder="请输入验证码" maxlength="4">
          <div class="code-img" id="captchaCode" onclick="refreshCaptcha()">A3K9</div>
        </div>
      </div>
      <button class="login-btn" onclick="doLogin()">
        <span>→</span> 立即登录
      </button>
      <div class="footer-link">
        <a href="javascript:void(0)" onclick="showToast('请联系管理员','error')">忘记密码？</a>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
function refreshCaptcha(){
  var chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  var code='';
  for(var i=0;i<4;i++) code+=chars[Math.floor(Math.random()*chars.length)];
  document.getElementById('captchaCode').textContent=code;
}

function doLogin(){
  var u=document.getElementById('userName').value.trim();
  var p=document.getElementById('password').value.trim();
  var c=document.getElementById('captcha').value.trim();
  var realCode=document.getElementById('captchaCode').textContent;
  if(!u){showToast('请输入账号','error');return;}
  if(!p){showToast('请输入密码','error');return;}
  if(c!==realCode){showToast('请输入正确的验证码','error');refreshCaptcha();return;}
  showToast('登录成功','success');
  setTimeout(function(){window.location.href='admin-user-list.html';},800);
}

function showToast(msg,type){
  var t=document.getElementById('toast');
  t.textContent=msg;t.className='toast '+(type||'success')+' show';
  setTimeout(function(){t.classList.remove('show');},2000);
}
</script>
</body>
</html>
