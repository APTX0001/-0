<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=1280"><title>修改密码</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Microsoft YaHei',sans-serif;background:#f0f2f5;color:#333;font-size:14px}
.admin-layout{height:100vh;display:flex;flex-direction:column}
.header{height:60px;background:#fff;border-bottom:1px solid #dcdfe6;display:flex;align-items:center;justify-content:space-between;padding:0 20px;box-shadow:0 1px 4px rgba(0,21,41,.08);flex-shrink:0}
.header-l{display:flex;align-items:center;gap:15px}.logo{width:40px;height:40px;background:#4CAF50;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;font-weight:bold}
.sys-title{font-size:18px;font-weight:600;color:#1a1a1a;display:block}.sys-sub{font-size:12px;color:#666;display:block}
.header-r .user-box{display:flex;align-items:center;gap:8px;cursor:pointer;padding:6px 10px;border-radius:6px}
.user-box:hover{background:#f5f7fa}.user-av{width:32px;height:32px;border-radius:50%;background:#e8f5e9;display:flex;align-items:center;justify-content:center;color:#4CAF50;font-size:16px}
.uname{font-size:14px;color:#303133;font-weight:500;display:block}
.drop-menu{display:none;position:absolute;top:100%;right:0;margin-top:8px;background:#fff;border-radius:8px;box-shadow:0 6px 20px rgba(0,0,0,.12);min-width:140px;z-index:100}
.drop-menu.show{display:block}.drop-item{padding:12px 16px;display:flex;align-items:center;gap:8px;color:#606266;cursor:pointer}
.drop-item:hover{background:#f5f7fa;color:#4CAF50}
.main-container{flex:1;display:flex;overflow:hidden}
.sidebar{width:240px;min-width:240px;background:#fff;box-shadow:2px 0 8px rgba(0,0,0,.08);border-right:1px solid #f0f0f0;overflow-y:auto;flex-shrink:0}
.sidebar::before{content:'';display:block;height:3px;background:linear-gradient(90deg,#409EFF,#67C23A,#E6A23C,#F56C6C);position:sticky;top:0;z-index:2}
.sidebar::-webkit-scrollbar{width:4px}.menu{padding:15px 0}
.m-item{position:relative;margin:0 8px;border-radius:8px;cursor:pointer;transition:all .3s;width:calc(100% - 16px)}.m-item:hover{background:#f8f9fa;transform:translateX(4px)}
.m-item.active{background:linear-gradient(135deg,#409EFF,#337ecc);box-shadow:0 4px 12px rgba(64,158,255,.2)}
.m-content{display:flex;align-items:center;padding:12px 16px;color:#606266}.m-item.active .m-content{color:#fff}
.m-icon{font-size:16px;margin-right:12px;width:24px;text-align:center}.m-text{font-size:14px;font-weight:500;flex:1}
.m-expand{font-size:10px;margin-left:auto;transition:transform .3s;color:#909399}.m-expand.open{transform:rotate(90deg)}
.sub-container{display:none;margin-left:16px;border-left:2px solid #e4e7ed;padding:4px 0}.sub-container.show{display:block}
.sub-item{display:flex;align-items:center;padding:10px 16px;margin:2px 8px 2px 2px;border-radius:6px;color:#909399;cursor:pointer;transition:all .3s}
.sub-item:hover{background:#f0f2f5;color:#606266;transform:translateX(4px)}
.sub-item.active{background:linear-gradient(135deg,rgba(64,158,255,.1),rgba(51,126,204,.1));color:#409EFF;font-weight:600}
.sub-icon{font-size:13px;margin-right:10px;width:18px;text-align:center}.sub-text{font-size:13px}
.main-content{flex:1;padding:20px;overflow-y:auto;background:#f0f2f5}
.breadcrumb{display:flex;align-items:center;padding:10px 14px;background:#fff;border-radius:6px;margin-bottom:20px;font-size:14px;color:#666;gap:8px}
.card{background:#fff;border-radius:8px;padding:30px;margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,.04);max-width:500px}
.btn{padding:10px 24px;border-radius:6px;font-size:14px;cursor:pointer;border:none;font-family:inherit}
.btn-p{background:#409EFF;color:#fff;width:100%}.btn-p:hover{background:#66b1ff}
.fg{margin-bottom:20px}.flbl{display:block;font-size:13px;color:#606266;font-weight:500;margin-bottom:6px}
.finp{width:100%;padding:10px 12px;border:1px solid #dcdfe6;border-radius:6px;font-size:14px;outline:none;transition:border .2s}
.finp:focus{border-color:#4CAF50;box-shadow:0 0 0 2px rgba(76,175,80,.15)}
.tips{margin-top:20px;padding:14px;background:#f0fdf4;border-radius:6px;border-left:3px solid #4CAF50}
.tips-title{font-size:13px;color:#2E7D32;font-weight:600;margin-bottom:8px}
.tips-item{font-size:12px;color:#374151;line-height:2}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#fff;padding:12px 24px;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.15);z-index:3000;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}.toast.s{border-left:3px solid #67C23A;color:#67C23A}.toast.e{border-left:3px solid #F56C6C;color:#F56C6C}
</style></head><body>
<div class="admin-layout">
  <header class="header"><div class="header-l"><div class="logo">🏥</div><div><span class="sys-title">个人健康小程序管理端</span><span class="sys-sub">SpringBoot4 + Vue3</span></div></div><div class="header-r"><div class="dropdown" style="position:relative"><div class="user-box" onclick="document.getElementById('dm').classList.toggle('show')"><div class="user-av">👤</div><div><span class="uname">admin</span></div><span>▼</span></div><div class="drop-menu" id="dm"><div class="drop-item" onclick="navTo('admin-user-person.html')">👤 个人信息</div><div class="drop-item" onclick="if(confirm('确定退出？'))navTo('admin-login.html')">🚪 退出</div></div></div></div></header>
  <div class="main-container"><aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
      <div class="breadcrumb"><a href="admin-user-list.html">控制台</a> / <span>修改密码</span></div>
      <div class="card">
        <div class="fg"><label class="flbl">原始密码</label><input type="password" class="finp" id="oldPwd" placeholder="请输入原始密码"></div>
        <div class="fg"><label class="flbl">新密码</label><input type="password" class="finp" id="newPwd" placeholder="请输入新密码"></div>
        <div class="fg"><label class="flbl">确认密码</label><input type="password" class="finp" id="cfmPwd" placeholder="请再次输入新密码"></div>
        <button class="btn btn-p" onclick="doSubmit()">确认修改</button>
        <div class="tips"><div class="tips-title">密码安全建议：</div><div class="tips-item">• 密码长度至少8位字符</div><div class="tips-item">• 包含字母、数字和特殊字符</div><div class="tips-item">• 避免使用生日、手机号等个人信息</div></div>
      </div>
    </main>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
var sb=[{t:'item',icon:'🏠',text:'控制台',url:'admin-user-list.html'},{t:'group',icon:'👥',text:'用户管理',key:'u',items:[{icon:'👤',text:'账号管理',url:'admin-user-list.html'}]},{t:'group',icon:'🍎',text:'饮食管理',key:'d',items:[{icon:'🥗',text:'食物管理',url:'admin-food-list.html'},{icon:'📋',text:'食物分类',url:'admin-food-type-list.html'},{icon:'⚖️',text:'食物单位',url:'admin-food-unit-list.html'},{icon:'📖',text:'食谱管理',url:'admin-recipe-list.html'},{icon:'📊',text:'饮食记录',url:'admin-diet-record-list.html'}]},{t:'group',icon:'🏃',text:'运动管理',key:'sm',items:[{icon:'🏋️',text:'运动参考',url:'admin-sport-list.html'},{icon:'📏',text:'运动单位',url:'admin-sport-unit-list.html'},{icon:'📈',text:'运动记录',url:'admin-sport-record-list.html'}]},{t:'group',icon:'💚',text:'健康管理',key:'hm',items:[{icon:'🩺',text:'健康指标',url:'admin-health-indicator-list.html'},{icon:'📑',text:'指标分类',url:'admin-health-indicator-type-list.html'},{icon:'📋',text:'指标记录',url:'admin-health-indicator-record-list.html'},{icon:'⏰',text:'健康提醒',url:'admin-health-notice-list.html'}]},{t:'group',icon:'📚',text:'知识管理',key:'km',items:[{icon:'📄',text:'健康知识',url:'admin-health-article-list.html'},{icon:'🏷️',text:'知识分类',url:'admin-health-article-type-list.html'}]},{t:'group',icon:'💖',text:'互动管理',key:'im',items:[{icon:'⭐',text:'收藏记录',url:'admin-collect-record-list.html'},{icon:'👍',text:'点赞记录',url:'admin-like-record-list.html'}]}];
(function rs(){var h='';sb.forEach(function(m){if(m.t==='item'){h+='<div class="m-item" onclick="navTo(\''+m.url+'\')"><div class="m-content"><span class="m-icon">'+m.icon+'</span><span class="m-text">'+m.text+'</span></div></div>'}else{h+='<div class="m-group"><div class="m-item m-sub-h" onclick="var e=document.getElementById(\'sub-'+m.key+'\');this.classList.toggle(\'expanded\');e.classList.toggle(\'show\');this.querySelector(\'.m-expand\').classList.toggle(\'open\')"><div class="m-content"><span class="m-icon">'+m.icon+'</span><span class="m-text">'+m.text+'</span><span class="m-expand">▶</span></div></div><div class="sub-container" id="sub-'+m.key+'">';m.items.forEach(function(s){h+='<div class="sub-item" onclick="navTo(\''+s.url+'\')"><span class="sub-icon">'+s.icon+'</span><span class="sub-text">'+s.text+'</span></div>'});h+='</div></div>'}});document.getElementById('sidebar').innerHTML=h})();
function doSubmit(){var o=document.getElementById('oldPwd').value,n=document.getElementById('newPwd').value,c=document.getElementById('cfmPwd').value;if(!o){showT('请输入原始密码','e');return}if(!n){showT('请输入新密码','e');return}if(n!==c){showT('两次密码不一致','e');return}showT('密码修改成功','s');setTimeout(function(){navTo('admin-login.html')},1000)}
function navTo(url){window.location.href=url}function showT(msg,type){var t=document.getElementById('toast');t.textContent=msg;t.className='toast '+(type||'s')+' show';setTimeout(function(){t.classList.remove('show')},2000)}
document.addEventListener('click',function(e){if(!e.target.closest('.dropdown'))document.getElementById('dm').classList.remove('show')});
</script>
</body></html>
