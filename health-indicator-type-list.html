<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>健康指标分类</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#10b981}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f0f0f0;display:flex;justify-content:center;min-height:100vh}
.app{width:375px;min-height:100vh;background:#f5f5f5}
.nav{position:fixed;top:0;left:0;right:0;z-index:999;background:var(--primary);box-shadow:0 2px 6px rgba(0,0,0,.15);display:flex;align-items:center;height:44px;padding:0 10px;color:#fff}
.nav .back{font-size:16px;color:#fff;cursor:pointer;padding:4px 8px;background:none;border:none}
.nav .title{flex:1;text-align:center;font-size:17px;font-weight:600;margin-right:30px}
.page-body{padding:60px 12px 20px}
.card{background:#fff;border-radius:12px;padding:16px;margin:10px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.card-title{font-size:16px;font-weight:600;color:#333;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #f0f0f0}
.cat-item{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #f5f5f5;cursor:pointer}
.cat-item:last-child{border-bottom:none}
.cat-icon{width:36px;height:36px;border-radius:8px;background:#e8f5e9;display:flex;align-items:center;justify-content:center;margin-right:10px;font-size:16px;flex-shrink:0}
.cat-info{flex:1}
.cat-name{font-size:14px;font-weight:600;color:#333;display:block;margin-bottom:3px}
.cat-desc{font-size:12px;color:#999}
.cat-arrow{color:#ccc}
.empty{text-align:center;padding:60px;color:#999;font-size:14px}
</style>
</head>
<body>
<div class="app">
  <div class="nav">
    <button class="back" onclick="history.back()">‹ 返回</button>
    <span class="title">健康指标分类</span>
  </div>
  <div class="page-body">
    <div class="card" id="list"></div>
  </div>
</div>
<script>
var categories=[
  {Id:1,Name:'基础体征',Desc:'体温、体重、心率等基础健康数据',Count:3},
  {Id:2,Name:'血液指标',Desc:'血糖、胆固醇、血红蛋白等血液检测指标',Count:5},
  {Id:3,Name:'代谢指标',Desc:'基础代谢率、BMI等代谢相关指标',Count:2},
];
function render(){
  var el=document.getElementById('list'),h='<div class="card-title">健康指标分类列表</div>';
  categories.forEach(function(c){
    h+='<div class="cat-item"><div class="cat-icon">📊</div><div class="cat-info"><span class="cat-name">'+c.Name+'</span><span class="cat-desc">'+c.Desc+' · '+c.Count+'项</span></div><span class="cat-arrow">›</span></div>';
  });
  el.innerHTML=h;
}
render();
</script>
</body>
</html>
