<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>收藏记录列表</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#10b981}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f0f0f0;display:flex;justify-content:center;min-height:100vh}
.app{width:375px;min-height:100vh;background:#f5f5f5}
.nav{position:fixed;top:0;left:0;right:0;z-index:999;background:var(--primary);box-shadow:0 2px 6px rgba(0,0,0,.15);display:flex;align-items:center;height:44px;padding:0 10px;color:#fff}
.nav .back{font-size:16px;color:#fff;cursor:pointer;padding:4px 8px;background:none;border:none}
.nav .title{flex:1;text-align:center;font-size:17px;font-weight:600;margin-right:30px}

.tabs{position:sticky;top:44px;z-index:10;display:flex;background:#fff;border-bottom:1px solid #eee}
.tab{flex:1;text-align:center;padding:14px;font-size:14px;color:#666;cursor:pointer;position:relative;transition:all .2s}
.tab.active{color:var(--primary);font-weight:600}
.tab.active::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:30px;height:3px;background:var(--primary);border-radius:2px}

.list{padding:12px}
.list-item{display:flex;align-items:center;padding:16px;background:#fff;border-radius:10px;margin-bottom:10px;box-shadow:0 1px 6px rgba(0,0,0,.1);cursor:pointer;transition:all .2s}
.list-item:active{transform:translateY(-1px);box-shadow:0 3px 12px rgba(0,0,0,.12)}
.item-cover{width:60px;height:60px;border-radius:8px;background:#e8f5e9;display:flex;align-items:center;justify-content:center;font-size:24px;margin-right:14px;flex-shrink:0}
.item-content{flex:1;display:flex;flex-direction:column;gap:4px}
.item-title{font-size:15px;font-weight:600;color:#333;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.item-meta{display:flex;justify-content:space-between;font-size:11px;color:#999}
.delete-btn{padding:8px 14px;background:#ff4757;color:#fff;font-size:12px;border-radius:12px;border:none;cursor:pointer;flex-shrink:0;margin-left:10px}
.empty{text-align:center;padding:80px 20px;color:#999;font-size:14px}
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.75);color:#fff;padding:10px 20px;border-radius:6px;font-size:14px;z-index:3000;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="app">
  <div class="nav">
    <button class="back" onclick="history.back()">‹ 返回</button>
    <span class="title">收藏记录列表</span>
  </div>
  <div class="tabs">
    <span class="tab active" onclick="switchTab('健康知识',this)">健康知识</span>
    <span class="tab" onclick="switchTab('食谱',this)">食谱</span>
  </div>
  <div class="list" id="list"></div>
  <div class="toast" id="toast"></div>
</div>
<script>
var records=[
  {Id:1,CollectType:'健康知识',RelativeId:1,HealthArticleDto:{Title:'春季养生小贴士',Cover:'',ViewCount:1256},CreationTime:'2026-05-03 10:00'},
  {Id:2,CollectType:'健康知识',RelativeId:2,HealthArticleDto:{Title:'每天运动30分钟的好处',Cover:'',ViewCount:890},CreationTime:'2026-05-02 14:00'},
  {Id:3,CollectType:'食谱',RelativeId:1,RecipeDto:{Title:'低脂鸡胸肉沙拉',Cover:'',ViewCount:2340},CreationTime:'2026-05-01 09:00'},
];
var activeTab='健康知识';

function switchTab(t,el){
  activeTab=t;
  document.querySelectorAll('.tab').forEach(function(e){e.classList.remove('active');});
  el.classList.add('active');
  render();
}

function fmtTime(s){
  var d=new Date(s),n=new Date(),diff=Math.floor((n-d)/60000);
  if(diff<1)return'刚刚';if(diff<60)return diff+'分钟前';
  var h=Math.floor(diff/60);if(h<24)return h+'小时前';
  var days=Math.floor(diff/1440);if(days<7)return days+'天前';
  return s.split(' ')[0];
}

function render(){
  var filtered=records.filter(function(r){return r.CollectType===activeTab;});
  var el=document.getElementById('list'),h='';
  if(!filtered.length){el.innerHTML='<div class="empty">暂无'+activeTab+'收藏</div>';return;}
  filtered.forEach(function(r){
    var dto=r.CollectType==='健康知识'?r.HealthArticleDto:r.RecipeDto;
    h+='<div class="list-item" onclick="navTo(\''+(r.CollectType==='健康知识'?'health-article-detail.html?id='+r.RelativeId:'recipe-detail.html?id='+r.RelativeId)+'\')">';
    h+='<div class="item-cover">'+(r.CollectType==='健康知识'?'📖':'🥗')+'</div><div class="item-content">';
    h+='<div class="item-title">'+dto.Title+'</div>';
    h+='<div class="item-meta"><span>阅读 '+dto.ViewCount+'</span><span>'+fmtTime(r.CreationTime)+'</span></div></div>';
    h+='<button class="delete-btn" onclick="event.stopPropagation();del('+r.Id+')">删除</button>';
    h+='</div>';
  });
  el.innerHTML=h;
}

function del(id){if(confirm('确认删除该收藏记录吗？')){records=records.filter(function(r){return r.Id!==id;});render();showToast('删除成功');}}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},1500);}
function navTo(url){window.location.href=url;}
render();
</script>
</body>
</html>
