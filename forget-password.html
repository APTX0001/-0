<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>找回密码</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f0f0; display: flex; justify-content: center; min-height: 100vh; }
.container { width: 375px; min-height: 100vh; background: linear-gradient(135deg, #e8f8f5 0%, #f0fdf4 50%, #ffffff 100%); position: relative; overflow: hidden; }
.bg-circle { position: absolute; border-radius: 50%; opacity: .08; background: linear-gradient(45deg, #10b981, #34d399); pointer-events: none; }
.bg-circle-1 { width: 300px; height: 300px; top: -100px; right: -100px; animation: float 15s ease-in-out infinite; }
.bg-circle-2 { width: 180px; height: 180px; bottom: -60px; left: -60px; animation: float 20s ease-in-out infinite reverse; }
@keyframes float { 0%,100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-15px) rotate(3deg); } }
.header { padding: 70px 0 45px; text-align: center; position: relative; z-index: 1; }
.header-icon { font-size: 70px; margin-bottom: 20px; background: linear-gradient(135deg,#10b981,#34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: inline-block; }
.header-title { display: block; font-size: 26px; font-weight: 600; color: #065f46; margin-bottom: 10px; }
.header-sub { display: block; font-size: 14px; color: #6b7280; opacity: .8; }
.form-section { position: relative; z-index: 1; padding: 0 25px; }
.form-card { background: rgba(255,255,255,.95); border-radius: 16px; padding: 35px 25px; box-shadow: 0 4px 20px rgba(0,0,0,.06); border: 1px solid rgba(255,255,255,.8); }
.form-group { margin-bottom: 22px; }
.input-row { display: flex; align-items: center; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 10px; padding: 0 14px; transition: all .3s; }
.input-row:focus-within { border-color: #10b981; background: #fff; box-shadow: 0 0 0 3px rgba(16,185,129,.1); }
.input-emoji { font-size: 18px; color: #6b7280; margin-right: 10px; }
.form-input { flex: 1; height: 44px; font-size: 16px; color: #374151; background: transparent; border: none; outline: none; }
.form-input::placeholder { color: #9ca3af; }
.submit-btn { width: 100%; height: 44px; background: linear-gradient(135deg, #10b981, #34d399); border: none; border-radius: 22px; margin: 25px 0 18px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 16px rgba(16,185,129,.3); cursor: pointer; }
.submit-btn:active { transform: translateY(1px); }
.btn-text { color: #fff; font-size: 16px; font-weight: 600; }
.link-row { display: flex; justify-content: center; }
.link { font-size: 14px; color: #10b981; font-weight: 500; cursor: pointer; }
.tips { margin-top: 28px; padding: 18px; background: linear-gradient(135deg, #f0fdf4, #ecfdf5); border-radius: 10px; border: 1px solid rgba(16,185,129,.1); }
.tips-title { font-size: 14px; color: #065f46; font-weight: 600; margin-bottom: 12px; }
.tips-item { font-size: 12px; color: #374151; line-height: 2; }
.toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(0,0,0,.75); color: #fff; padding: 10px 20px; border-radius: 6px; font-size: 14px; z-index: 3000; opacity: 0; transition: opacity .3s; pointer-events: none; }
.toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="container">
  <div class="bg-circle bg-circle-1"></div>
  <div class="bg-circle bg-circle-2"></div>
  <div class="header">
    <div class="header-icon">🔑</div>
    <span class="header-title">找回密码</span>
    <span class="header-sub">验证您的身份信息，重新设置密码</span>
  </div>
  <div class="form-section">
    <div class="form-card">
      <div class="form-group">
        <div class="input-row"><span class="input-emoji">👤</span><input type="text" id="userName" class="form-input" placeholder="请输入用户名"></div>
      </div>
      <div class="form-group">
        <div class="input-row"><span class="input-emoji">📱</span><input type="tel" id="phone" class="form-input" placeholder="请输入注册手机号"></div>
      </div>
      <div class="form-group">
        <div class="input-row"><span class="input-emoji">🔒</span><input type="password" id="newPwd" class="form-input" placeholder="请输入新密码"></div>
      </div>
      <button class="submit-btn" onclick="doReset()"><span class="btn-text">重置密码</span></button>
      <div class="link-row"><span class="link" onclick="navTo('login.html')">返回登录</span></div>
      <div class="tips">
        <div class="tips-title">密码重置说明：</div>
        <div class="tips-item">• 请确保输入的手机号与注册时一致</div>
        <div class="tips-item">• 新密码将立即生效，请妥善保管</div>
        <div class="tips-item">• 如遇问题，请联系客服寻求帮助</div>
      </div>
    </div>
  </div>
  <div class="toast" id="toast"></div>
</div>
<script>
function doReset() {
  var name = document.getElementById('userName').value.trim();
  var phone = document.getElementById('phone').value.trim();
  var pwd = document.getElementById('newPwd').value.trim();
  if (!name) { showToast('请输入账户'); return; }
  if (!phone) { showToast('请输入手机号'); return; }
  if (!pwd) { showToast('请输入密码'); return; }
  showToast('密码重置成功');
  setTimeout(function(){ navTo('login.html'); }, 1000);
}
function navTo(url) { window.location.href = url; }
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 1500);
}
</script>
</body>
</html>
