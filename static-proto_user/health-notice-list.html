<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>健康提醒</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#10b981;--primary-light:#34d399}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f0f0f0;display:flex;justify-content:center;min-height:100vh}
.app{width:375px;min-height:100vh;background:linear-gradient(135deg,#ecfdf5 0%,#f0fdf4 100%)}
.nav{position:fixed;top:0;left:0;right:0;z-index:999;background:var(--primary);box-shadow:0 2px 6px rgba(0,0,0,.15);display:flex;align-items:center;height:44px;padding:0 10px;color:#fff}
.nav .back{font-size:16px;color:#fff;cursor:pointer;padding:4px 8px;background:none;border:none}
.nav .title{flex:1;text-align:center;font-size:17px;font-weight:600;margin-right:30px}

.content{padding:54px 12px 40px}
.notice-card{background:#fff;border-radius:14px;margin-bottom:14px;padding:18px;box-shadow:0 4px 16px rgba(16,185,129,.08);border:1px solid var(--primary-light);cursor:pointer;transition:all .2s;position:relative}
.notice-card:active{transform:scale(.98)}
.card-head{margin-bottom:14px}
.title-row{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.title-wrap{display:flex;align-items:center;gap:6px;flex:1;margin-right:8px}
.notice-title{font-size:16px;font-weight:600;color:#065f46;line-height:1.3}
.status-badge{padding:4px 10px;border-radius:10px;font-size:11px;font-weight:500;flex-shrink:0}
.status-reminded{background:var(--primary-light);color:#fff}
.status-unreminded{background:#FFEBEE;color:#E57373}
.notice-content{font-size:14px;color:#065f46;line-height:1.5}
.card-info{display:flex;gap:16px;margin-bottom:14px;font-size:12px;color:var(--primary);font-weight:500}
.card-actions{display:flex;gap:8px;justify-content:flex-end}
.action-btn{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;color:#fff;font-size:14px;transition:all .2s}
.action-btn:active{transform:scale(.9)}
.edit-btn{background:var(--primary)}
.delete-btn{background:#E57373}

.fab{position:fixed;bottom:30px;right:20px;width:56px;height:56px;background:linear-gradient(135deg,var(--primary),var(--primary-light));border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:28px;box-shadow:0 8px 24px rgba(16,185,129,.4);cursor:pointer;z-index:99;transition:all .2s}
.fab:active{transform:scale(.9)}

.empty{text-align:center;padding:80px 20px}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:.7}
.empty-title{font-size:18px;color:#065f46;font-weight:600;margin-bottom:8px}
.empty-desc{font-size:14px;color:var(--primary)}
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.75);color:#fff;padding:10px 20px;border-radius:6px;font-size:14px;z-index:3000;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="app">
  <div class="nav">
    <button class="back" onclick="history.back()">‹ 返回</button>
    <span class="title">健康提醒</span>
  </div>
  <div class="content" id="noticeList"></div>
  <div class="fab" onclick="navTo('health-notice-form.html')">+</div>
  <div class="toast" id="toast"></div>
</div>
<script>
var notices = [
  { Id:1, Title:'测量空腹血糖', Content:'每天早上7点测量空腹血糖并记录', IsRemind:true, RemindTime:'2026-05-05 07:00:00', RemindType:'邮件' },
  { Id:2, Title:'晨跑30分钟', Content:'围绕小区慢跑30分钟，心率控制在120-140', IsRemind:false, RemindTime:'2026-05-06 06:30:00', RemindType:'邮件' },
  { Id:3, Title:'服用维生素', Content:'早餐后服用维生素D和钙片', IsRemind:true, RemindTime:'2026-05-05 08:30:00', RemindType:'邮件' },
  { Id:4, Title:'喝水提醒', Content:'每小时喝一杯水，保持身体水分充足', IsRemind:false, RemindTime:'2026-05-05 10:00:00', RemindType:'邮件' },
];

function fmtDT(s){if(!s)return'';var d=new Date(s);return ('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2)+' '+('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);}

function render(){
  var el=document.getElementById('noticeList'),h='';
  if(!notices.length){el.innerHTML='<div class="empty"><div class="empty-icon">❤️</div><div class="empty-title">暂无健康提醒</div><div class="empty-desc">开始管理您的健康生活吧</div></div>';return;}
  notices.forEach(function(n){
    h+='<div class="notice-card" onclick="navTo(\'health-notice-form.html?id='+n.Id+'\')">';
    h+='<div class="card-head"><div class="title-row"><div class="title-wrap"><span style="color:var(--primary);font-size:14px">❤️</span><span class="notice-title">'+n.Title+'</span></div><span class="status-badge '+(n.IsRemind?'status-reminded':'status-unreminded')+'">'+(n.IsRemind?'已提醒':'未提醒')+'</span></div>';
    h+='<div class="notice-content">'+n.Content+'</div></div>';
    h+='<div class="card-info"><span>📅 '+fmtDT(n.RemindTime)+'</span><span>🔔 '+n.RemindType+'</span></div>';
    h+='<div class="card-actions"><button class="action-btn edit-btn" onclick="event.stopPropagation();navTo(\'health-notice-form.html?id='+n.Id+'\')">✎</button><button class="action-btn delete-btn" onclick="event.stopPropagation();del('+n.Id+')">✕</button></div>';
    h+='</div>';
  });
  el.innerHTML=h;
}

function del(id){if(confirm('确认删除该健康提醒吗？')){notices=notices.filter(function(n){return n.Id!==id;});render();showToast('删除成功');}}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},1500);}
function navTo(url){window.location.href=url;}
render();
</script>
</body>
</html>
