<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>运动参考库</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--green-dark:#2E7D32;--green-mid:#4CAF50}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f0f0f0;display:flex;justify-content:center;min-height:100vh}
.app{width:375px;height:100vh;background:linear-gradient(135deg,#e8f5e8,#f0f8f0);display:flex;flex-direction:column}
.nav{background:var(--green-mid);box-shadow:0 2px 6px rgba(0,0,0,.15);display:flex;align-items:center;height:44px;padding:0 10px;color:#fff;flex-shrink:0}
.nav .back{font-size:16px;color:#fff;cursor:pointer;padding:4px 8px;background:none;border:none}
.nav .title{flex:1;text-align:center;font-size:17px;font-weight:600;margin-right:30px}

.scroll-area{flex:1;overflow-y:auto;padding:10px}
.sport-card{background:#fff;border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:0 2px 10px rgba(76,175,80,.08);border:1px solid rgba(76,175,80,.1);cursor:pointer}
.sport-card:active{background:#f0f8f0}
.sport-top{display:flex;margin-bottom:10px}
.sport-img{width:60px;height:60px;border-radius:8px;background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:28px;margin-right:12px;flex-shrink:0}
.sport-info{flex:1}
.sport-name{font-size:16px;font-weight:bold;color:var(--green-dark);margin-bottom:6px}
.sport-desc{font-size:13px;color:#666;line-height:1.4;margin-bottom:8px}
.unit-tags{display:flex;flex-wrap:wrap;gap:8px}
.unit-tag{padding:5px 12px;background:#e8f5e8;border:1px solid var(--green-mid);border-radius:8px;font-size:12px;color:var(--green-dark);cursor:pointer;transition:all .2s}
.unit-tag:active{background:#d4f4d4;transform:scale(.98)}

.popup{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:2000;align-items:center;justify-content:center}
.popup.show{display:flex}
.popup-card{width:300px;background:#fff;border-radius:16px;overflow:hidden}
.popup-head{display:flex;justify-content:space-between;align-items:center;padding:16px;background:#e8f5e8}
.popup-title{font-size:16px;font-weight:bold;color:var(--green-dark)}
.popup-close{cursor:pointer;font-size:18px;color:#666;padding:4px}
.popup-body{padding:16px}
.popup-summary{display:flex;align-items:center;padding:12px;background:#e8f5e8;border-radius:10px;margin-bottom:16px}
.summary-img{width:44px;height:44px;border-radius:8px;background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:20px;margin-right:12px}
.summary-name{font-size:14px;font-weight:bold;color:var(--green-dark);display:block}
.summary-unit{font-size:12px;color:#558B2F}
.input-section{margin-bottom:16px}
.input-label{font-size:14px;font-weight:bold;color:var(--green-dark);margin-bottom:8px;display:block}
.input-row{display:flex;align-items:center}
.input-row input{flex:1;height:36px;padding:0 10px;border:1px solid #e0e0e0;border-radius:8px;font-size:14px;outline:none}
.input-unit{margin-left:8px;font-size:13px;color:#558B2F;font-weight:600;background:#e8f5e8;padding:6px 12px;border-radius:8px}
.cal-box{margin-bottom:16px;text-align:center}
.cal-title{font-size:14px;font-weight:bold;color:var(--green-dark);margin-bottom:10px}
.cal-val{padding:10px;background:#e8f5e8;border-radius:10px;font-size:24px;font-weight:bold;color:var(--green-dark)}
.cal-val small{font-size:14px;color:#558B2F}
.btn-row{display:flex;gap:10px}
.btn{flex:1;height:38px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer}
.btn-cancel{background:#e0e0e0;color:#666}
.btn-save{background:linear-gradient(135deg,#4CAF50,#66BB6A);color:#fff}
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.75);color:#fff;padding:10px 20px;border-radius:6px;font-size:14px;z-index:3000;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="app">
  <div class="nav">
    <button class="back" onclick="history.back()">‹ 返回</button>
    <span class="title">🏃‍♂️ 运动参考库</span>
  </div>
  <div class="scroll-area" id="sportList"></div>
</div>
<div class="popup" id="popup">
  <div class="popup-card">
    <div class="popup-head">
      <span class="popup-title">🏃‍♂️ 添加运动记录</span>
      <span class="popup-close" onclick="closePopup()">✕</span>
    </div>
    <div class="popup-body">
      <div class="popup-summary">
        <div class="summary-img">🏃</div>
        <div>
          <span class="summary-name" id="popName"></span>
          <span class="summary-unit" id="popUnit"></span>
        </div>
      </div>
      <div class="input-section">
        <span class="input-label">🏃‍♂️ 请输入运动量</span>
        <div class="input-row">
          <input type="number" id="amount" value="1" min="1" oninput="calcCal()" placeholder="请输入数量">
          <span class="input-unit" id="unitLabel"></span>
        </div>
      </div>
      <div class="cal-box" id="calBox"></div>
      <div class="btn-row">
        <button class="btn btn-cancel" onclick="closePopup()">取消</button>
        <button class="btn btn-save" onclick="saveRecord()">💾 保存记录</button>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
var sports = [
  { Id:1, Name:'跑步', Cover:'', Content:'户外跑步是一种高效的有氧运动，能有效提高心肺功能，燃烧大量卡路里。建议每周3-5次。', SportUnits:[{Id:1,UnitName:'公里',UnitValue:1,Calories:70},{Id:2,UnitName:'分钟',UnitValue:1,Calories:10}] },
  { Id:2, Name:'游泳', Cover:'', Content:'游泳是全身性运动，对关节友好，适合各年龄段人群。', SportUnits:[{Id:3,UnitName:'分钟',UnitValue:1,Calories:10},{Id:4,UnitName:'圈',UnitValue:1,Calories:50}] },
  { Id:3, Name:'瑜伽', Cover:'', Content:'瑜伽能改善身体柔韧性，缓解压力，调节身心平衡。', SportUnits:[{Id:5,UnitName:'分钟',UnitValue:1,Calories:3},{Id:6,UnitName:'节课',UnitValue:1,Calories:180}] },
  { Id:4, Name:'骑行', Cover:'', Content:'骑行是低冲击有氧运动，增强腿部力量和心肺功能。', SportUnits:[{Id:7,UnitName:'公里',UnitValue:1,Calories:40},{Id:8,UnitName:'分钟',UnitValue:1,Calories:8}] },
];
var cur = null;

function render() {
  var h = '';
  sports.forEach(function(s){
    h += '<div class="sport-card" onclick="openDetail('+s.Id+')">';
    h += '<div class="sport-top"><div class="sport-img">🏃</div><div class="sport-info">';
    h += '<div class="sport-name">'+s.Name+'</div>';
    h += '<div class="sport-desc">'+s.Content+'</div>';
    h += '<div class="unit-tags">';
    s.SportUnits.forEach(function(u){
      h += '<span class="unit-tag" onclick="event.stopPropagation();selectUnit('+s.Id+','+u.Id+')">'+u.UnitName+' ('+u.Calories+'kcal)</span>';
    });
    h += '</div></div></div></div>';
  });
  document.getElementById('sportList').innerHTML = h;
}

function openDetail(id){/* 不处理 */}

function findSport(sid) { return sports.find(function(s){return s.Id===sid;}); }

function selectUnit(sid, uid) {
  var s = findSport(sid);
  if (!s) return;
  var u = s.SportUnits.find(function(x){return x.Id===uid;});
  if (!u) return;
  cur = {sport:s, unit:u};
  document.getElementById('popName').textContent = s.Name;
  document.getElementById('popUnit').textContent = '单位: '+u.UnitName;
  document.getElementById('unitLabel').textContent = u.UnitName;
  document.getElementById('amount').value = 1;
  document.getElementById('popup').classList.add('show');
  calcCal();
}

function calcCal() {
  if (!cur) return;
  var amt = parseFloat(document.getElementById('amount').value)||0;
  var cal = Math.round(cur.unit.Calories * amt * 100)/100;
  document.getElementById('calBox').innerHTML = '<div class="cal-title">🔥 预计热量消耗</div><div class="cal-val">'+cal+' <small>kcal</small></div>';
}

function closePopup(){document.getElementById('popup').classList.remove('show');cur=null;}
function saveRecord(){showToast('记录保存成功！');closePopup();}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},1500);}
function navTo(url){window.location.href=url;}
render();
</script>
</body>
</html>
