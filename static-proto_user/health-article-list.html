<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>健康知识列表</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --primary: #10b981; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f0f0; display: flex; justify-content: center; min-height: 100vh; }
.app { width: 375px; min-height: 100vh; background: #f5f5f5; }
.nav { position: fixed; top: 0; left: 0; right: 0; z-index: 999; background: var(--primary); box-shadow: 0 2px 6px rgba(0,0,0,.15); display: flex; align-items: center; height: 44px; padding: 0 10px; color: #fff; }
.nav .back { font-size: 16px; color: #fff; cursor: pointer; padding: 4px 8px; background: none; border: none; }
.nav .title { flex: 1; text-align: center; font-size: 17px; font-weight: 600; margin-right: 30px; }

.content { padding-top: 44px; }
.search-section { padding: 12px 15px; background: #fff; margin-bottom: 0; }
.search-input { width: 100%; height: 36px; background: #f5f5f5; border: none; border-radius: 18px; padding: 0 16px; font-size: 14px; outline: none; }

.category-filter { background: #fff; padding: 12px 0; margin-bottom: 10px; overflow-x: auto; white-space: nowrap; }
.category-filter::-webkit-scrollbar { display: none; }
.category-list { display: flex; padding: 0 15px; gap: 10px; }
.category-item { flex-shrink: 0; padding: 8px 18px; background: #f8f8f8; border-radius: 20px; font-size: 14px; color: #666; cursor: pointer; transition: all .3s; }
.category-item.active { background: var(--primary); color: #fff; }

.article-list { padding: 0 15px; }
.article-card { background: #fff; border-radius: 14px; margin-bottom: 16px; overflow: hidden; box-shadow: 0 2px 10px rgba(0,0,0,.1); cursor: pointer; transition: transform .2s; }
.article-card:active { transform: scale(.98); }
.article-cover { position: relative; height: 180px; overflow: hidden; background: #e8f5e9; }
.article-cover img { width: 100%; height: 100%; object-fit: cover; }
.cover-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 48px; }
.audit-badge { position: absolute; top: 10px; right: 10px; padding: 4px 10px; border-radius: 12px; font-size: 12px; color: #fff; }
.audit-badge.approved { background: #4cd964; }
.audit-badge.pending { background: #ff9500; }

.article-info { padding: 16px; }
.article-title { font-size: 16px; font-weight: 600; color: #333; line-height: 1.4; margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.article-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.cat-tag { padding: 4px 10px; background: #f0f0f0; border-radius: 8px; font-size: 12px; color: #666; }
.views { display: flex; align-items: center; gap: 4px; font-size: 12px; color: #999; }
.publish-info { display: flex; justify-content: space-between; font-size: 12px; color: #999; }
.empty { text-align: center; padding: 80px 20px; color: #999; font-size: 14px; }
</style>
</head>
<body>
<div class="app">
  <div class="nav">
    <button class="back" onclick="history.back()">‹ 返回</button>
    <span class="title">健康知识列表</span>
  </div>
  <div class="content">
    <div class="search-section">
      <input type="text" class="search-input" placeholder="搜索健康知识..." id="searchInput" oninput="doSearch()">
    </div>
    <div class="category-filter">
      <div class="category-list" id="catList">
        <span class="category-item active" onclick="filterCat(0)">全部</span>
        <span class="category-item" onclick="filterCat(1)">养生保健</span>
        <span class="category-item" onclick="filterCat(2)">运动健身</span>
        <span class="category-item" onclick="filterCat(3)">饮食营养</span>
        <span class="category-item" onclick="filterCat(4)">疾病管理</span>
      </div>
    </div>
    <div class="article-list" id="articleList"></div>
  </div>
</div>
<script>
var articles = [
  { Id:1, Title:'春季养生小贴士：如何调理身体迎接春天', Cover:'', CreationTime:'2026-05-03', HealthArticleTypeDto:{Name:'养生保健',Id:1}, ViewCount:1256, AuditStatus:2, AuditStatusFormat:'已审核', PublishUserDto:{Name:'张医生'} },
  { Id:2, Title:'每天坚持运动30分钟，身体会发生哪些变化？', Cover:'', CreationTime:'2026-05-02', HealthArticleTypeDto:{Name:'运动健身',Id:2}, ViewCount:2341, AuditStatus:2, AuditStatusFormat:'已审核', PublishUserDto:{Name:'李教练'} },
  { Id:3, Title:'健康饮食金字塔：科学搭配每日膳食', Cover:'', CreationTime:'2026-05-01', HealthArticleTypeDto:{Name:'饮食营养',Id:3}, ViewCount:987, AuditStatus:2, AuditStatusFormat:'已审核', PublishUserDto:{Name:'王营养师'} },
  { Id:4, Title:'高血压患者的日常注意事项', Cover:'', CreationTime:'2026-04-30', HealthArticleTypeDto:{Name:'疾病管理',Id:4}, ViewCount:3456, AuditStatus:2, AuditStatusFormat:'已审核', PublishUserDto:{Name:'赵主任'} },
  { Id:5, Title:'夏季防暑降温的正确方法', Cover:'', CreationTime:'2026-04-28', HealthArticleTypeDto:{Name:'养生保健',Id:1}, ViewCount:1890, AuditStatus:1, AuditStatusFormat:'待审核', PublishUserDto:{Name:'张医生'} },
];
var activeCat = 0, keyword = '';

function formatTime(s) {
  var d = new Date(s), now = new Date();
  var diff = Math.floor((now - d) / 86400000);
  if (diff === 0) return '今天';
  if (diff === 1) return '昨天';
  if (diff < 7) return diff + '天前';
  return s;
}

function render() {
  var filtered = articles.filter(function(a){
    if (activeCat !== 0 && a.HealthArticleTypeDto.Id !== activeCat) return false;
    if (keyword && a.Title.indexOf(keyword) === -1) return false;
    return true;
  });
  var el = document.getElementById('articleList');
  if (filtered.length === 0) { el.innerHTML = '<div class="empty">暂无相关健康知识</div>'; return; }
  var h = '';
  filtered.forEach(function(a){
    h += '<div class="article-card" onclick="navTo(\'health-article-detail.html?id='+a.Id+'\')">';
    h += '<div class="article-cover">';
    if (a.Cover) h += '<img src="'+a.Cover+'" alt="">';
    else h += '<div class="cover-placeholder">📖</div>';
    h += '<div class="audit-badge '+ (a.AuditStatus===2?'approved':'pending') +'">'+a.AuditStatusFormat+'</div>';
    h += '</div>';
    h += '<div class="article-info">';
    h += '<div class="article-title">'+a.Title+'</div>';
    h += '<div class="article-meta"><span class="cat-tag">'+a.HealthArticleTypeDto.Name+'</span><span class="views">👁 '+a.ViewCount+'</span></div>';
    h += '<div class="publish-info"><span>'+a.PublishUserDto.Name+'</span><span>'+formatTime(a.CreationTime)+'</span></div>';
    h += '</div></div>';
  });
  el.innerHTML = h;
}

function filterCat(id) {
  activeCat = id;
  var items = document.querySelectorAll('#catList .category-item');
  items.forEach(function(it){ it.classList.remove('active'); });
  items[id].classList.add('active');
  render();
}

function doSearch() {
  keyword = document.getElementById('searchInput').value.trim();
  render();
}

function navTo(url) { window.location.href = url; }
render();
</script>
</body>
</html>
