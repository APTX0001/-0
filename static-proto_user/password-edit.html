<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>修改密码</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#10b981}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f0f0f0;display:flex;justify-content:center;min-height:100vh}
.app{width:375px;min-height:100vh;background:linear-gradient(135deg,#e8f8f5,#f0fdf4,#fff)}
.nav{position:fixed;top:0;left:0;right:0;z-index:999;background:var(--primary);display:flex;align-items:center;height:44px;padding:0 10px;color:#fff;box-shadow:0 2px 6px rgba(0,0,0,.15)}
.nav .back{font-size:16px;color:#fff;cursor:pointer;padding:4px 8px;background:none;border:none}
.nav .title{flex:1;text-align:center;font-size:17px;font-weight:600;margin-right:30px}
.page-body{padding:80px 15px 30px}
.header{text-align:center;margin-bottom:35px}
.header-icon{font-size:50px;margin-bottom:15px;display:inline-block}
.page-title{display:block;font-size:22px;font-weight:600;color:#065f46;margin-bottom:8px}
.page-sub{display:block;font-size:13px;color:#6b7280}
.form-card{background:rgba(255,255,255,.95);border-radius:14px;padding:22px 18px;box-shadow:0 4px 20px rgba(0,0,0,.06)}
.form-item{margin-bottom:22px}
.form-label{display:block;font-size:14px;color:#374151;font-weight:500;margin-bottom:8px}
.input-row{display:flex;align-items:center;background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;padding:0 12px;transition:all .3s}
.input-row:focus-within{border-color:var(--primary);background:#fff;box-shadow:0 0 0 3px rgba(16,185,129,.1)}
.input-icon{font-size:16px;color:#6b7280;margin-right:8px}
.form-input{flex:1;height:40px;font-size:14px;color:#374151;background:transparent;border:none;outline:none}
.submit-btn{width:100%;height:44px;background:linear-gradient(135deg,var(--primary),#34d399);color:#fff;border:none;border-radius:22px;font-size:16px;font-weight:600;cursor:pointer;margin-top:25px;box-shadow:0 4px 16px rgba(16,185,129,.3)}
.tips{margin-top:25px;padding:16px;background:linear-gradient(135deg,#f0fdf4,#ecfdf5);border-radius:10px;border:1px solid rgba(16,185,129,.1)}
.tips-title{font-size:14px;color:#065f46;margin-bottom:10px;font-weight:600}
.tips-item{font-size:12px;color:#374151;line-height:2}
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.75);color:#fff;padding:10px 20px;border-radius:6px;font-size:14px;z-index:3000;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="app">
  <div class="nav">
    <button class="back" onclick="history.back()">‹ 返回</button>
    <span class="title">修改密码</span>
  </div>
  <div class="page-body">
    <div class="header">
      <div class="header-icon">🔐</div>
      <span class="page-title">修改密码</span>
      <span class="page-sub">为了您的账户安全，请定期更新密码</span>
    </div>
    <div class="form-card">
      <div class="form-item">
        <label class="form-label">原始密码</label>
        <div class="input-row"><span class="input-icon">🔑</span><input type="password" class="form-input" id="oldPwd" placeholder="请输入原始密码"></div>
      </div>
      <div class="form-item">
        <label class="form-label">新密码</label>
        <div class="input-row"><span class="input-icon">🔒</span><input type="password" class="form-input" id="newPwd" placeholder="请输入新密码"></div>
      </div>
      <div class="form-item">
        <label class="form-label">确认密码</label>
        <div class="input-row"><span class="input-icon">✅</span><input type="password" class="form-input" id="cfmPwd" placeholder="请再次输入新密码"></div>
      </div>
      <button class="submit-btn" onclick="doSubmit()">确认修改</button>
      <div class="tips">
        <div class="tips-title">密码安全建议：</div>
        <div class="tips-item">• 密码长度至少8位字符</div>
        <div class="tips-item">• 包含字母、数字和特殊字符</div>
        <div class="tips-item">• 避免使用生日、手机号等个人信息</div>
      </div>
    </div>
  </div>
  <div class="toast" id="toast"></div>
</div>
<script>
function doSubmit(){
  var o=document.getElementById('oldPwd').value;
  var n=document.getElementById('newPwd').value;
  var c=document.getElementById('cfmPwd').value;
  if(!o){showToast('请输入原始密码');return;}
  if(!n){showToast('请输入新密码');return;}
  if(n!==c){showToast('两次密码不一致');return;}
  showToast('密码修改成功，请重新登录');
  setTimeout(function(){window.location.href='login.html';},1000);
}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},1500);}
</script>
</body>
</html>
