<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>健康食物库</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--green-dark:#2E7D32;--green-mid:#4CAF50}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f0f0f0;display:flex;justify-content:center;min-height:100vh}
.app{width:375px;height:100vh;background:linear-gradient(135deg,#e8f5e8,#f0f8f0);display:flex;flex-direction:column}
.nav{background:var(--green-mid);box-shadow:0 2px 6px rgba(0,0,0,.15);display:flex;align-items:center;height:44px;padding:0 10px;color:#fff;flex-shrink:0}
.nav .back{font-size:16px;color:#fff;cursor:pointer;padding:4px 8px;background:none;border:none}
.nav .title{flex:1;text-align:center;font-size:17px;font-weight:600;margin-right:30px}

.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:70px;background:#fff;border-right:1px solid #e0f0e0;overflow-y:auto;flex-shrink:0}
.side-item{padding:16px 8px;text-align:center;font-size:12px;color:#333;border-bottom:1px solid #f0f0f0;cursor:pointer;transition:all .2s;word-break:break-all}
.side-item.active{background:linear-gradient(90deg,#e8f5e8,#d4f4d4);color:var(--green-dark);font-weight:bold;border-right:3px solid var(--green-mid)}

.food-area{flex:1;overflow-y:auto;padding:10px}
.cat-title{position:sticky;top:0;background:linear-gradient(135deg,#e8f5e8,#f0f8f0);padding:10px 0;font-size:16px;font-weight:bold;color:var(--green-dark);z-index:5}
.food-item{display:flex;padding:12px;border-bottom:1px solid #f0f0f0;cursor:pointer;transition:background .2s}
.food-item:active{background:#f0f8f0}
.food-img{width:60px;height:60px;border-radius:8px;background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:28px;margin-right:12px;flex-shrink:0}
.food-detail{flex:1;min-width:0}
.food-name{font-size:15px;font-weight:bold;color:var(--green-dark);margin-bottom:6px}
.nutrition{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.nut-item{font-size:11px;color:#558B2F;background:#e8f5e8;padding:2px 8px;border-radius:8px}
.units{display:flex;flex-wrap:wrap;gap:6px}
.unit-tag{padding:4px 10px;background:#e8f5e8;border:1px solid var(--green-mid);border-radius:6px;font-size:11px;color:var(--green-dark);cursor:pointer;transition:all .2s}
.unit-tag:active{background:#d4f4d4;transform:scale(.98)}

.popup{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:2000;align-items:center;justify-content:center}
.popup.show{display:flex}
.popup-card{width:300px;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 8px 32px rgba(76,175,80,.2)}
.popup-head{display:flex;justify-content:space-between;align-items:center;padding:16px;background:#e8f5e8}
.popup-title{font-size:16px;font-weight:bold;color:var(--green-dark)}
.popup-close{cursor:pointer;font-size:18px;color:#666;padding:4px}
.popup-body{padding:16px}
.popup-food{display:flex;align-items:center;padding:12px;background:#e8f5e8;border-radius:10px;margin-bottom:16px}
.popup-img{width:44px;height:44px;border-radius:8px;background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:20px;margin-right:12px}
.popup-name{font-size:14px;font-weight:bold;color:var(--green-dark)}
.popup-unit{font-size:12px;color:#558B2F}
.input-section{margin-bottom:16px}
.input-label{font-size:14px;font-weight:bold;color:var(--green-dark);margin-bottom:8px;display:block}
.input-row{display:flex;align-items:center}
.input-row input{flex:1;height:36px;padding:0 10px;border:1px solid #e0e0e0;border-radius:8px;font-size:14px;outline:none}
.input-unit{margin-left:8px;font-size:13px;color:#558B2F;font-weight:600;background:#e8f5e8;padding:6px 12px;border-radius:8px}
.nut-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.nut-card{padding:10px;background:#e8f5e8;border-radius:8px;text-align:center}
.nut-card .label{font-size:11px;color:#558B2F;display:block;margin-bottom:4px}
.nut-card .value{font-size:12px;font-weight:bold;color:var(--green-dark)}
.btn-row{display:flex;gap:10px}
.btn{flex:1;height:38px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer}
.btn-cancel{background:#e0e0e0;color:#666}
.btn-save{background:linear-gradient(135deg,#4CAF50,#66BB6A);color:#fff}
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.75);color:#fff;padding:10px 20px;border-radius:6px;font-size:14px;z-index:3000;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="app">
  <div class="nav">
    <button class="back" onclick="history.back()">‹ 返回</button>
    <span class="title">🥗 健康食物库</span>
  </div>
  <div class="main">
    <div class="sidebar" id="sidebar"></div>
    <div class="food-area" id="foodArea"></div>
  </div>
</div>
<div class="popup" id="popup">
  <div class="popup-card">
    <div class="popup-head">
      <span class="popup-title">🍽️ 添加食物记录</span>
      <span class="popup-close" onclick="closePopup()">✕</span>
    </div>
    <div class="popup-body">
      <div class="popup-food">
        <div class="popup-img">🍎</div>
        <div>
          <div class="popup-name" id="popName"></div>
          <div class="popup-unit" id="popUnit"></div>
        </div>
      </div>
      <div class="input-section">
        <span class="input-label">🥄 请输入分量</span>
        <div class="input-row">
          <input type="number" id="amount" value="1" min="1" oninput="calcNut()" placeholder="请输入数量">
          <span class="input-unit" id="unitLabel"></span>
        </div>
      </div>
      <div class="nut-cards" id="nutCards"></div>
      <div class="btn-row">
        <button class="btn btn-cancel" onclick="closePopup()">取消</button>
        <button class="btn btn-save" onclick="saveRecord()">💾 保存记录</button>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
var foodTypes = [
  { Id:1, Name:'主食', Foods:[
    { Id:101, Name:'米饭', Cover:'', Calories:1.16, Protein:0.03, Carbohydrates:0.26, Fat:0.003, FoodUnits:[{Id:1,UnitName:'碗',UnitValue:200,Calories:232,Protein:6,Carbohydrates:52,Fat:0.6}] },
    { Id:102, Name:'全麦面包', Cover:'', Calories:2.5, Protein:0.09, Carbohydrates:0.43, Fat:0.04, FoodUnits:[{Id:2,UnitName:'片',UnitValue:50,Calories:125,Protein:4.5,Carbohydrates:21.5,Fat:2}] },
  ]},
  { Id:2, Name:'肉类', Foods:[
    { Id:201, Name:'鸡胸肉', Cover:'', Calories:1.65, Protein:0.31, Carbohydrates:0, Fat:0.036, FoodUnits:[{Id:3,UnitName:'块',UnitValue:200,Calories:330,Protein:62,Carbohydrates:0,Fat:7.2}] },
    { Id:202, Name:'三文鱼', Cover:'', Calories:2.08, Protein:0.2, Carbohydrates:0, Fat:0.13, FoodUnits:[{Id:4,UnitName:'份',UnitValue:150,Calories:312,Protein:30,Carbohydrates:0,Fat:19.5}] },
  ]},
  { Id:3, Name:'蔬菜', Foods:[
    { Id:301, Name:'西兰花', Cover:'', Calories:0.34, Protein:0.03, Carbohydrates:0.07, Fat:0.004, FoodUnits:[{Id:5,UnitName:'份',UnitValue:100,Calories:34,Protein:3,Carbohydrates:7,Fat:0.4}] },
  ]},
  { Id:4, Name:'水果', Foods:[
    { Id:401, Name:'苹果', Cover:'', Calories:0.52, Protein:0.003, Carbohydrates:0.14, Fat:0.002, FoodUnits:[{Id:6,UnitName:'个',UnitValue:200,Calories:104,Protein:0.6,Carbohydrates:28,Fat:0.4}] },
    { Id:402, Name:'香蕉', Cover:'', Calories:0.89, Protein:0.01, Carbohydrates:0.23, Fat:0.003, FoodUnits:[{Id:7,UnitName:'根',UnitValue:120,Calories:107,Protein:1.2,Carbohydrates:27.6,Fat:0.4}] },
  ]},
];
var curUnit = null;

function renderSidebar() {
  var h = '';
  foodTypes.forEach(function(ft,i){
    h += '<div class="side-item'+(i===0?' active':'')+'" onclick="scrollToCat('+i+')">'+ft.Name+'</div>';
  });
  document.getElementById('sidebar').innerHTML = h;
}
function renderFoods() {
  var h = '';
  foodTypes.forEach(function(ft){
    h += '<div class="cat-title" id="cat-'+ft.Id+'">🌿 '+ft.Name+'</div>';
    ft.Foods.forEach(function(f){
      h += '<div class="food-item" onclick="openUnitPopup('+JSON.stringify(ft.Id)+','+JSON.stringify(f.Id)+')">';
      h += '<div class="food-img">🍽️</div><div class="food-detail">';
      h += '<div class="food-name">'+f.Name+'</div>';
      h += '<div class="nutrition">';
      h += '<span class="nut-item">热量: '+f.Calories+'kcal/g</span>';
      h += '<span class="nut-item">蛋白质: '+f.Protein+'g</span>';
      h += '<span class="nut-item">碳水: '+f.Carbohydrates+'g</span>';
      h += '<span class="nut-item">脂肪: '+f.Fat+'g</span>';
      h += '</div>';
      h += '<div class="units">';
      f.FoodUnits.forEach(function(u){
        h += '<span class="unit-tag" onclick="event.stopPropagation();selectUnit('+ft.Id+','+f.Id+','+u.Id+')">'+u.UnitName+' ('+u.Calories+'kcal)</span>';
      });
      h += '</div></div></div>';
    });
  });
  document.getElementById('foodArea').innerHTML = h;
}

function findFood(typeId, foodId) {
  var ft = foodTypes.find(function(t){return t.Id===typeId;});
  return ft ? ft.Foods.find(function(f){return f.Id===foodId;}) : null;
}

function selectUnit(typeId, foodId, unitId) {
  var f = findFood(typeId, foodId);
  if (!f) return;
  var u = f.FoodUnits.find(function(x){return x.Id===unitId;});
  if (!u) return;
  curUnit = {food:f, unit:u};
  document.getElementById('popName').textContent = f.Name;
  document.getElementById('popUnit').textContent = '单位: '+u.UnitName+' ('+u.UnitValue+'g)';
  document.getElementById('unitLabel').textContent = u.UnitName;
  document.getElementById('amount').value = 1;
  document.getElementById('popup').classList.add('show');
  calcNut();
}

function openUnitPopup(typeId, foodId) {
  // noop - 点击食物项暂不处理
}

function calcNut() {
  if (!curUnit) return;
  var amt = parseFloat(document.getElementById('amount').value)||0;
  var u = curUnit.unit;
  var cals = Math.round(u.Calories * amt * 100)/100;
  var prot = Math.round(u.Protein * amt * 100)/100;
  var carb = Math.round(u.Carbohydrates * amt * 100)/100;
  var fat = Math.round(u.Fat * amt * 100)/100;
  document.getElementById('nutCards').innerHTML =
    '<div class="nut-card"><span class="label">热量</span><span class="value">'+cals+'kcal</span></div>'+
    '<div class="nut-card"><span class="label">蛋白质</span><span class="value">'+prot+'g</span></div>'+
    '<div class="nut-card"><span class="label">碳水</span><span class="value">'+carb+'g</span></div>'+
    '<div class="nut-card"><span class="label">脂肪</span><span class="value">'+fat+'g</span></div>';
}

function closePopup(){document.getElementById('popup').classList.remove('show');curUnit=null;}
function saveRecord(){showToast('记录保存成功！');closePopup();}
function scrollToCat(i){var ft=foodTypes[i];var el=document.getElementById('cat-'+ft.Id);if(el)el.scrollIntoView({behavior:'smooth'});}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},1500);}
function navTo(url){window.location.href=url;}

renderSidebar();
renderFoods();
</script>
</body>
</html>
