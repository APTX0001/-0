<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>健康提醒信息</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#10b981}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f0f0f0;display:flex;justify-content:center;min-height:100vh}
.app{width:375px;min-height:100vh;background:linear-gradient(180deg,#f8f9fa,#fff)}
.nav{position:fixed;top:0;left:0;right:0;z-index:999;background:var(--primary);box-shadow:0 2px 6px rgba(0,0,0,.15);display:flex;align-items:center;height:44px;padding:0 10px;color:#fff}
.nav .back{font-size:16px;color:#fff;cursor:pointer;padding:4px 8px;background:none;border:none}
.nav .title{flex:1;text-align:center;font-size:17px;font-weight:600;margin-right:30px}
.page-body{padding:60px 15px 30px}
.form-card{background:#fff;border-radius:14px;padding:22px 18px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.form-header{text-align:center;margin-bottom:30px}
.form-header .main{display:block;font-size:18px;font-weight:600;color:#2c3e50;margin-bottom:8px}
.form-header .sub{display:block;font-size:13px;color:#7f8c8d}
.form-item{margin-bottom:22px}
.form-label{display:block;font-size:14px;color:#34495e;font-weight:500;margin-bottom:8px}
.form-input{width:100%;padding:12px 14px;background:#f8f9fa;border:1px solid #e9ecef;border-radius:10px;font-size:14px;color:#2c3e50;outline:none;transition:all .3s}
.form-input:focus{border-color:var(--primary);background:#fff;box-shadow:0 0 0 3px rgba(16,185,129,.1)}
textarea.form-input{min-height:80px;resize:vertical}
.submit-btn{width:100%;height:44px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;box-shadow:0 4px 12px rgba(16,185,129,.3);margin-top:30px;transition:all .2s}
.submit-btn:active{transform:translateY(1px)}
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.75);color:#fff;padding:10px 20px;border-radius:6px;font-size:14px;z-index:3000;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="app">
  <div class="nav">
    <button class="back" onclick="history.back()">‹ 返回</button>
    <span class="title">健康提醒信息</span>
  </div>
  <div class="page-body">
    <div class="form-card">
      <div class="form-header">
        <span class="main">创建健康提醒</span>
        <span class="sub">设置个性化的健康提醒计划</span>
      </div>
      <div class="form-item">
        <label class="form-label">提醒标题 *</label>
        <input type="text" class="form-input" id="title" placeholder="请输入提醒标题" value="测量空腹血糖">
      </div>
      <div class="form-item">
        <label class="form-label">提醒内容 *</label>
        <textarea class="form-input" id="content" placeholder="请输入提醒内容">每天早上7点测量空腹血糖并记录</textarea>
      </div>
      <div class="form-item">
        <label class="form-label">提醒时间 *</label>
        <input type="datetime-local" class="form-input" id="remindTime" value="2026-05-05T07:00">
      </div>
      <div class="form-item">
        <label class="form-label">提醒方式 *</label>
        <select class="form-input" id="remindType"><option selected>邮件</option><option>短信</option><option>App推送</option></select>
      </div>
      <button class="submit-btn" onclick="doSubmit()">创建提醒</button>
    </div>
  </div>
  <div class="toast" id="toast"></div>
</div>
<script>
function doSubmit(){
  var title=document.getElementById('title').value.trim();
  var content=document.getElementById('content').value.trim();
  if(!title){showToast('请输入提醒标题');return;}
  if(!content){showToast('请输入提醒内容');return;}
  showToast('操作成功');
  setTimeout(function(){history.back();},800);
}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},1500);}
function navTo(url){window.location.href=url;}
</script>
</body>
</html>
