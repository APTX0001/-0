<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>用户注册</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f0f0; display: flex; justify-content: center; min-height: 100vh; }
.register-container { width: 375px; min-height: 100vh; background: linear-gradient(135deg, #e8f8f5 0%, #f0fdf4 50%, #ffffff 100%); position: relative; overflow: hidden; }
.bg-decoration { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
.health-circle { position: absolute; border-radius: 50%; opacity: .08; background: linear-gradient(45deg, #10b981, #34d399); }
.health-circle-1 { width: 300px; height: 300px; top: -100px; right: -100px; animation: float 15s ease-in-out infinite; }
.health-circle-2 { width: 180px; height: 180px; bottom: -60px; left: -60px; animation: float 20s ease-in-out infinite reverse; }
@keyframes float { 0%,100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-15px) rotate(3deg); } }
.header-section { padding: 60px 0 35px; text-align: center; position: relative; z-index: 1; }
.health-icon { font-size: 70px; margin-bottom: 20px; background: linear-gradient(135deg,#10b981,#34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: inline-block; }
.app-title { display: block; font-size: 26px; font-weight: 600; color: #065f46; margin-bottom: 10px; }
.app-subtitle { display: block; font-size: 14px; color: #6b7280; opacity: .8; }
.form-section { position: relative; z-index: 1; padding: 0 25px; }
.form-container { background: rgba(255,255,255,.95); border-radius: 16px; padding: 35px 25px; box-shadow: 0 4px 20px rgba(0,0,0,.06); border: 1px solid rgba(255,255,255,.8); }
.form-group { margin-bottom: 22px; }
.input-wrapper { display: flex; align-items: center; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 10px; padding: 0 14px; transition: all .3s; }
.input-wrapper:focus-within { border-color: #10b981; background: #fff; box-shadow: 0 0 0 3px rgba(16,185,129,.1); }
.input-icon { font-size: 18px; color: #6b7280; margin-right: 10px; }
.form-input { flex: 1; height: 44px; font-size: 16px; color: #374151; background: transparent; border: none; outline: none; }
.form-input::placeholder { color: #9ca3af; }
.role-wrapper { padding: 14px; background: #f9fafb; border-radius: 10px; border: 1px solid #e5e7eb; }
.role-label { display: block; font-size: 14px; color: #374151; margin-bottom: 10px; font-weight: 500; }
.role-options { display: flex; gap: 12px; }
.role-option { padding: 8px 20px; border-radius: 8px; font-size: 14px; border: 1px solid #e5e7eb; background: #fff; color: #666; cursor: pointer; transition: all .2s; }
.role-option.active { background: #10b981; color: #fff; border-color: #10b981; }
.register-button { width: 100%; height: 44px; background: linear-gradient(135deg, #10b981, #34d399); border: none; border-radius: 22px; margin: 25px 0 18px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 16px rgba(16,185,129,.3); cursor: pointer; transition: all .3s; }
.register-button:active { transform: translateY(1px); }
.button-text { color: #fff; font-size: 16px; font-weight: 600; }
.action-links { display: flex; justify-content: center; }
.link-text { font-size: 14px; color: #10b981; font-weight: 500; cursor: pointer; }
.register-tips { margin-top: 28px; padding: 18px; background: linear-gradient(135deg, #f0fdf4, #ecfdf5); border-radius: 10px; border: 1px solid rgba(16,185,129,.1); }
.tips-title { font-size: 14px; color: #065f46; font-weight: 600; margin-bottom: 12px; }
.tips-item { font-size: 12px; color: #374151; line-height: 2; }
.toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(0,0,0,.75); color: #fff; padding: 10px 20px; border-radius: 6px; font-size: 14px; z-index: 3000; opacity: 0; transition: opacity .3s; pointer-events: none; }
.toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="register-container">
  <div class="bg-decoration">
    <div class="health-circle health-circle-1"></div>
    <div class="health-circle health-circle-2"></div>
  </div>
  <div class="header-section">
    <div class="health-icon">🏥</div>
    <span class="app-title">用户注册</span>
    <span class="app-subtitle">加入我们，开启健康管理之旅</span>
  </div>
  <div class="form-section">
    <div class="form-container">
      <div class="form-group">
        <div class="input-wrapper"><span class="input-icon">👤</span><input type="text" id="userName" class="form-input" placeholder="请输入用户名"></div>
      </div>
      <div class="form-group">
        <div class="input-wrapper"><span class="input-icon">🔒</span><input type="password" id="password" class="form-input" placeholder="请输入密码"></div>
      </div>
      <div class="form-group">
        <div class="input-wrapper"><span class="input-icon">📱</span><input type="tel" id="phone" class="form-input" placeholder="请输入手机号"></div>
      </div>
      <div class="form-group">
        <div class="role-wrapper">
          <span class="role-label">用户角色</span>
          <div class="role-options" id="roleOptions">
            <span class="role-option active" data-role="2">普通用户</span>
            <span class="role-option" data-role="3">医生</span>
          </div>
        </div>
      </div>
      <button class="register-button" onclick="doRegister()"><span class="button-text">立即注册</span></button>
      <div class="action-links"><span class="link-text" onclick="navTo('login.html')">已有账号？立即登录</span></div>
      <div class="register-tips">
        <div class="tips-title">注册说明：</div>
        <div class="tips-item">• 注册即表示您同意我们的服务条款</div>
        <div class="tips-item">• 请确保手机号真实有效，用于账户安全验证</div>
        <div class="tips-item">• 我们将保护您的个人隐私信息</div>
      </div>
    </div>
  </div>
  <div class="toast" id="toast"></div>
</div>
<script>
var selectedRole = '2';
document.getElementById('roleOptions').addEventListener('click', function(e){
  if (e.target.classList.contains('role-option')) {
    document.querySelectorAll('.role-option').forEach(function(el){ el.classList.remove('active'); });
    e.target.classList.add('active');
    selectedRole = e.target.dataset.role;
  }
});
function doRegister() {
  var name = document.getElementById('userName').value.trim();
  var pwd = document.getElementById('password').value.trim();
  var phone = document.getElementById('phone').value.trim();
  if (!name) { showToast('请输入账户'); return; }
  if (!pwd) { showToast('请输入密码'); return; }
  if (!phone) { showToast('请输入手机号'); return; }
  if (!/^\d{11}$/.test(phone)) { showToast('请输入正确的手机号'); return; }
  showToast('注册成功，请登录');
  setTimeout(function(){ navTo('login.html'); }, 1000);
}
function navTo(url) { window.location.href = url; }
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 1500);
}
</script>
</body>
</html>
