<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>微信绑定</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#10b981}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f0f0f0;display:flex;justify-content:center;min-height:100vh}
.app{width:375px;min-height:100vh;background:#f5f5f5}
.nav{position:fixed;top:0;left:0;right:0;z-index:999;background:var(--primary);box-shadow:0 2px 6px rgba(0,0,0,.15);display:flex;align-items:center;height:44px;padding:0 10px;color:#fff}
.nav .back{font-size:16px;color:#fff;cursor:pointer;padding:4px 8px;background:none;border:none}
.nav .title{flex:1;text-align:center;font-size:17px;font-weight:600;margin-right:30px}
.page-body{padding:20px 12px}
.header{text-align:center;padding:40px 0 30px;background:#fff;border-radius:14px;margin-bottom:16px}
.header-icon{font-size:48px;color:#07c160;margin-bottom:12px}
.header-title{display:block;font-size:18px;font-weight:bold;color:#333;margin-bottom:6px}
.header-sub{display:block;font-size:14px;color:#666}
.status-card{background:#fff;border-radius:14px;padding:18px;margin-bottom:16px}
.status-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.status-label{font-size:16px;font-weight:bold;color:#333}
.status-badge{padding:4px 12px;border-radius:8px;font-size:12px;font-weight:500}
.badge-bound{background:#d4edda;color:#155724}
.badge-unbound{background:#fff3cd;color:#856404}
.openid-section{margin-bottom:12px}
.openid-label{font-size:14px;color:#666;display:block;margin-bottom:6px}
.openid-value{font-size:15px;color:#333;font-family:monospace;background:#f8f9fa;padding:10px;border-radius:8px;display:block}
.bind-status{font-size:14px;color:#07c160;font-weight:500}

.bind-btn{width:100%;height:44px;background:linear-gradient(135deg,#07c160,#06ad56);color:#fff;border:none;border-radius:22px;font-size:16px;font-weight:bold;cursor:pointer;margin-bottom:16px}
.unbind-btn{width:100%;height:44px;background:linear-gradient(135deg,#f56c6c,#e85656);color:#fff;border:none;border-radius:22px;font-size:16px;font-weight:bold;cursor:pointer;margin-bottom:16px}

.tips-card{background:#fff;border-radius:14px;padding:18px}
.tips-title{font-size:15px;font-weight:bold;color:#333;margin-bottom:12px}
.tips-item{display:flex;align-items:center;gap:8px;font-size:13px;color:#666;margin-bottom:10px;line-height:1.5}
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.75);color:#fff;padding:10px 20px;border-radius:6px;font-size:14px;z-index:3000;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="app">
  <div class="nav">
    <button class="back" onclick="history.back()">‹ 返回</button>
    <span class="title">微信绑定</span>
  </div>
  <div class="page-body">
    <div class="header">
      <div class="header-icon">💬</div>
      <span class="header-title">微信绑定</span>
      <span class="header-sub">绑定微信账号，享受更便捷的登录体验</span>
    </div>
    <div class="status-card">
      <div class="status-row">
        <span class="status-label">绑定状态</span>
        <span class="status-badge badge-bound" id="statusBadge">已绑定</span>
      </div>
      <div class="openid-section">
        <span class="openid-label">微信OpenId:</span>
        <span class="openid-value" id="openId">ox***ABC123</span>
      </div>
      <div class="bind-status" id="bindStatus">✅ 微信账号已绑定</div>
    </div>
    <button class="unbind-btn" id="actionBtn" onclick="toggleBind()">解绑微信</button>
    <div class="tips-card">
      <div class="tips-title">温馨提示</div>
      <div class="tips-item">ℹ️ 绑定后可使用微信快速登录</div>
      <div class="tips-item">ℹ️ 解绑后将无法使用微信登录</div>
    </div>
  </div>
  <div class="toast" id="toast"></div>
</div>
<script>
var bound=true;
function toggleBind(){
  if(bound){
    if(confirm('解绑后将无法使用微信快速登录，确定要解绑吗？')){
      bound=false;
      document.getElementById('statusBadge').textContent='未绑定';document.getElementById('statusBadge').className='status-badge badge-unbound';
      document.getElementById('openId').textContent='';
      document.getElementById('bindStatus').textContent='';
      document.getElementById('actionBtn').textContent='绑定微信';document.getElementById('actionBtn').className='bind-btn';
      showToast('已解绑微信');
    }
  }else{
    showToast('模拟绑定成功');
    bound=true;
    document.getElementById('statusBadge').textContent='已绑定';document.getElementById('statusBadge').className='status-badge badge-bound';
    document.getElementById('openId').textContent='ox***ABC123';
    document.getElementById('bindStatus').textContent='✅ 微信账号已绑定';
    document.getElementById('actionBtn').textContent='解绑微信';document.getElementById('actionBtn').className='unbind-btn';
  }
}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},1500);}
</script>
</body>
</html>
