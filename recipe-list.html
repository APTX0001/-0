<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>食谱列表</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#10b981}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f0f0f0;display:flex;justify-content:center;min-height:100vh}
.app{width:375px;min-height:100vh;background:#f5f5f5}
.nav{position:fixed;top:0;left:0;right:0;z-index:999;background:var(--primary);box-shadow:0 2px 6px rgba(0,0,0,.15);display:flex;align-items:center;height:44px;padding:0 10px;color:#fff}
.nav .back{font-size:16px;color:#fff;cursor:pointer;padding:4px 8px;background:none;border:none}
.nav .title{flex:1;text-align:center;font-size:17px;font-weight:600;margin-right:30px}

.content{padding:54px 10px 20px}
.search-bar{padding:10px 15px;background:#fff;margin-bottom:10px}
.search-bar input{width:100%;height:36px;background:#f5f5f5;border:none;border-radius:18px;padding:0 16px;font-size:14px;outline:none}

.recipe-card{background:#fff;border-radius:14px;margin-bottom:14px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.1);cursor:pointer;transition:transform .2s}
.recipe-card:active{transform:scale(.98)}
.recipe-cover{position:relative;height:180px;overflow:hidden;background:#e8f5e9}
.recipe-cover img{width:100%;height:100%;object-fit:cover}
.cover-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:48px}
.view-count{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.6);padding:4px 10px;border-radius:12px;display:flex;align-items:center;gap:4px;color:#fff;font-size:12px}
.recipe-info{padding:16px}
.recipe-title{font-size:16px;font-weight:600;color:#333;margin-bottom:10px}
.recipe-desc{font-size:13px;color:#666;line-height:1.5;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.image-list{display:flex;gap:8px;margin-bottom:12px;overflow-x:auto}
.image-list img{width:60px;height:60px;border-radius:8px;object-fit:cover;flex-shrink:0}
.recipe-bottom{display:flex;justify-content:space-between;align-items:center}
.author-info{display:flex;flex-direction:column;gap:4px}
.author-name{font-size:13px;color:#333;font-weight:500}
.publish-time{font-size:12px;color:#999}
.status-badge{padding:4px 10px;border-radius:10px;font-size:12px;font-weight:500}
.status-approved{background:#d4edda;color:#155724}
.status-pending{background:#fff3cd;color:#856404}
.empty{text-align:center;padding:80px 20px;color:#999;font-size:14px}
</style>
</head>
<body>
<div class="app">
  <div class="nav">
    <button class="back" onclick="history.back()">‹ 返回</button>
    <span class="title">食谱列表</span>
  </div>
  <div class="content">
    <div class="search-bar">
      <input type="text" placeholder="搜索食谱..." id="searchInput" oninput="doSearch()">
    </div>
    <div id="recipeList"></div>
  </div>
</div>
<script>
var recipes = [
  { Id:1, Title:'低脂鸡胸肉沙拉', Content:'新鲜的鸡胸肉搭配时令蔬菜，低脂健康美味。富含蛋白质和维生素，是减脂餐的绝佳选择。制作简单，营养均衡...', Cover:'', ViewCount:2340, AuditStatus:2, AuditStatusFormat:'审核通过', PublishUserDto:{Name:'王大厨'}, CreationTime:'2026-05-03', imageList:[] },
  { Id:2, Title:'燕麦蓝莓早餐杯', Content:'隔夜燕麦搭配新鲜蓝莓，制作简单营养丰富。富含膳食纤维和抗氧化剂，是忙碌上班族的理想早餐选择...', Cover:'', ViewCount:1856, AuditStatus:2, AuditStatusFormat:'审核通过', PublishUserDto:{Name:'李美食'}, CreationTime:'2026-05-01', imageList:[] },
  { Id:3, Title:'清蒸鲈鱼配时蔬', Content:'鲜嫩鲈鱼清蒸保留原汁原味，搭配西兰花和胡萝卜，营养均衡口感鲜美。适合全家人享用的健康菜品...', Cover:'', ViewCount:3210, AuditStatus:2, AuditStatusFormat:'审核通过', PublishUserDto:{Name:'赵大厨'}, CreationTime:'2026-04-28', imageList:[] },
  { Id:4, Title:'藜麦牛油果碗', Content:'超级食物藜麦搭配牛油果，提供全面营养。富含健康脂肪和完全蛋白，适合健身后食用...', Cover:'', ViewCount:1567, AuditStatus:1, AuditStatusFormat:'待审核', PublishUserDto:{Name:'张营养'}, CreationTime:'2026-04-25', imageList:[] },
];

function getPlain(html) { return html ? html.replace(/<[^>]*>/g,'').substring(0,80)+'...' : ''; }
function fmtTime(s) {
  var d=new Date(s),n=new Date(),diff=Math.floor((n-d)/86400000);
  if(diff===0)return'今天';if(diff===1)return'昨天';if(diff<7)return diff+'天前';return s;
}
function render() {
  var kw = (document.getElementById('searchInput').value||'').trim();
  var list = recipes.filter(function(r){ return !kw||r.Title.indexOf(kw)!==-1; });
  var el = document.getElementById('recipeList');
  if (!list.length) { el.innerHTML='<div class="empty">暂无食谱数据</div>'; return; }
  var h = '';
  list.forEach(function(r){
    var sc = r.AuditStatus===2?'status-approved':'status-pending';
    h += '<div class="recipe-card" onclick="navTo(\'recipe-detail.html?id='+r.Id+'\')">';
    h += '<div class="recipe-cover">';
    h += r.Cover? '<img src="'+r.Cover+'" alt="">' : '<div class="cover-ph">🥗</div>';
    h += '<div class="view-count">👁 <span>'+r.ViewCount+'</span></div></div>';
    h += '<div class="recipe-info"><div class="recipe-title">'+r.Title+'</div>';
    h += '<div class="recipe-desc">'+getPlain(r.Content)+'</div>';
    if (r.imageList.length) {
      h += '<div class="image-list">'+r.imageList.map(function(i){ return '<img src="'+i+'" alt="">'; }).join('')+'</div>';
    }
    h += '<div class="recipe-bottom"><div class="author-info"><span class="author-name">'+r.PublishUserDto.Name+'</span><span class="publish-time">'+fmtTime(r.CreationTime)+'</span></div>';
    h += '<span class="status-badge '+sc+'">'+r.AuditStatusFormat+'</span></div></div></div>';
  });
  el.innerHTML = h;
}
function doSearch(){ render(); }
function navTo(url){ window.location.href=url; }
render();
</script>
</body>
</html>
